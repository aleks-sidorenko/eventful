name: tutorial-counter
version: "0.1.0"
maintainer: Alexander Sidorenko
stability: experimental
license: MIT

dependencies:
  - base >= 4.9 && < 5
  - eventium-core
  - eventium-memory

  - safe
  - stm

  # Used to convert markdown files to literate haskell
  - markdown-unlit >= 0.4

library:
  source-dirs:
    - .
  ghc-options: -Wall -pgmL markdown-unlit
